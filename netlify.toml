# Netlify yapılandırması
# Repo'yu Netlify'a bağlarsan tüm klasör (index.html + model/) otomatik yayınlanır.

[build]
  publish = "."

[[headers]]
  for = "/model/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
